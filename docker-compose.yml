services:

# PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: kukufiti_postgres
    environment:
      POSTGRES_DB: kukufiti_dev
      POSTGRES_USER: fred
      POSTGRES_PASSWORD: postgres_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fred -d kukufiti_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

# Migration Runner — runs all pending migrations and exits.
# The API service depends on this completing successfully, so the DB is always
# in a known state before any request is handled.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: kukufiti_migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "scripts.run_migration", "--all"]
    # Run once and exit — not a long-lived service
    restart: "no"

# API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: kukufiti_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      # Hot reload in development — mount only source directories, not the
      # entire project. Avoids .venv, .env, .git bleeding into the container.
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./migrations:/app/migrations
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app

volumes:
  postgres_data:
