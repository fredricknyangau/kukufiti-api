services:

# PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: kukufiti_postgres
    environment:
      POSTGRES_DB: kukufiti_dev
      POSTGRES_USER: fred
      POSTGRES_PASSWORD: postgres_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fred -d kukufiti_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

# API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: kukufiti_api
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
          # Hot reload in development — mount source code
      - ./app:/app/app
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app  

  # Migration Runner 
