services:
  postgres:
    image: postgres:16-alpine
    container_name: kukufiti_postgres
    environment:
      POSTGRES_DB: kukufiti_dev
      POSTGRES_USER: fred
      POSTGRES_PASSWORD: postgres_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fred -d kukufiti_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kukufiti_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fred:postgres_local@postgres:5432/kukufiti_dev
      BATCHES_DB_URL: postgresql://batches_app:batches_dev@postgres:5432/kukufiti_dev
      FINANCE_DB_URL: postgresql://finance_app:finance_dev@postgres:5432/kukufiti_dev
      HEALTH_DB_URL: postgresql://health_app:health_dev@postgres:5432/kukufiti_dev
      AUTH_DB_URL: postgresql://auth_app:auth_dev@postgres:5432/kukufiti_dev
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
